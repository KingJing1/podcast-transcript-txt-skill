interface:
  display_name: "Podcast Transcript TXT"
  short_description: "Export podcast transcript TXT + meta, then LLM-proofread"
  default_prompt: "Use $podcast-transcript-txt to export full transcript from a link/title. If the repo was just cloned, first run `python3 -m pip install -r requirements.txt`, then run `python3 scripts/podcast_transcript_txt.py --doctor`, and only proceed when `--doctor` exits 0. Only ask the user to choose ASR model if the run is likely to need audio fallback (small=fast draft, medium=slower but better terms). Deliver both TXT and meta.json, and explicitly remind this is a draft requiring one strong-LLM proofreading pass."
